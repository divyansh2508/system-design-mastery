# Minimal nginx reverse-proxy load balancer for the sandbox lab.
# This file REPLACES the image's default /etc/nginx/nginx.conf, so it must be
# complete: it needs its own events {} and http {} blocks.

events {}

http {
    # The upstream pool: the three whoami backends, referenced by their
    # Docker service names. With no method specified, nginx uses round-robin,
    # so requests rotate 1 -> 2 -> 3 -> 1 -> ...
    upstream backends {
        server whoami1:80;
        server whoami2:80;
        server whoami3:80;

        # --- Tuning passive health checks (Exercise 3) -----------------------
        # nginx OSS ALREADY quarantines a backend after it fails (defaults:
        # max_fails=1, fail_timeout=10s) — that is why traffic routes around a
        # stopped backend. These are *passive* checks: nginx never actively
        # probes the backends, it just watches real requests. Swap the three
        # plain lines above for these to TUNE the thresholds — tolerate 3 errors
        # and quarantine for 15s once tripped:
        #
        #   server whoami1:80 max_fails=3 fail_timeout=15s;
        #   server whoami2:80 max_fails=3 fail_timeout=15s;
        #   server whoami3:80 max_fails=3 fail_timeout=15s;
        # ---------------------------------------------------------------------
    }

    server {
        listen 80;

        location / {
            proxy_pass http://backends;

            # Pass useful context to the backend and let nginx retry the next
            # server in the pool if one refuses the connection or errors out.
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }
    }
}
