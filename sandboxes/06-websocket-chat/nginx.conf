# Minimal nginx reverse-proxy that load-balances WebSocket traffic across the
# two chat instances. This file REPLACES the image's default nginx.conf, so it
# must be complete: it needs its own events {} and http {} blocks.

events {}

http {
    # The upstream pool: the two chat servers, referenced by their Docker
    # service names. With no method specified, nginx uses round-robin, so new
    # connections alternate chat1 -> chat2 -> chat1 -> ...
    upstream chat_backends {
        server chat1:3000;
        server chat2:3000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://chat_backends;

            # --- The WebSocket upgrade handshake ---------------------------------
            # A WebSocket begins as an HTTP/1.1 request carrying `Upgrade: websocket`.
            # nginx must speak HTTP/1.1 upstream and forward the Upgrade/Connection
            # headers verbatim, or the protocol switch never happens and the socket
            # dies as a stalled HTTP request.
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;

            # WebSockets are long-lived and mostly idle — don't let nginx cut the
            # connection after the default 60s of silence.
            proxy_read_timeout 3600s;
        }
    }
}
